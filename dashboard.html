<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주문 대시보드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6c3fff;
      --primary-light: #ede9ff;
      --pending: #f59e0b;
      --pending-bg: #fef3c7;
      --paid: #3b82f6;
      --paid-bg: #dbeafe;
      --completed: #10b981;
      --completed-bg: #d1fae5;
      --cancel: #ef4444;
      --cancel-bg: #fee2e2;
      --text: #1a1a2e;
      --sub: #888;
      --border: #eee;
      --bg: #f4f3ff;
    }

    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
    }

    /* ── 헤더 ── */
    .header {
      background: linear-gradient(135deg, #6c3fff, #3b1f8c);
      padding: 20px 16px 28px;
      color: #fff;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .header h1 { font-size: 20px; font-weight: 700; }
    .header-date { font-size: 13px; opacity: .75; }

    /* 통계 카드 */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .stat-card {
      background: rgba(255,255,255,.15);
      border-radius: 12px;
      padding: 10px 8px;
      text-align: center;
    }
    .stat-card .num {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.1;
    }
    .stat-card .lbl {
      font-size: 11px;
      opacity: .8;
      margin-top: 3px;
    }

    /* ── 탭 ── */
    .tab-bar {
      display: flex;
      background: #fff;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .tab-btn {
      flex: 1;
      padding: 14px;
      font-size: 14px;
      font-weight: 600;
      color: var(--sub);
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      transition: all .2s;
    }
    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    /* ── 콘텐츠 ── */
    .content { padding: 16px; }

    /* ── 필터 ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-btn {
      flex-shrink: 0;
      padding: 7px 14px;
      border-radius: 50px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: 13px;
      font-weight: 600;
      color: var(--sub);
      cursor: pointer;
      transition: all .2s;
    }
    .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* ── 주문 카드 ── */
    .order-list { display: flex; flex-direction: column; gap: 12px; }

    .order-card {
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
      cursor: pointer;
      transition: transform .15s;
    }
    .order-card:active { transform: scale(.98); }

    .order-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .customer-name { font-size: 16px; font-weight: 700; }
    .customer-phone { font-size: 12px; color: var(--sub); margin-top: 2px; }

    .status-badge {
      padding: 4px 10px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .status-badge.pending    { background: var(--pending-bg);   color: var(--pending); }
    .status-badge.paid       { background: var(--paid-bg);      color: var(--paid); }
    .status-badge.completed  { background: var(--completed-bg); color: var(--completed); }
    .status-badge.cancelled  { background: var(--cancel-bg);    color: var(--cancel); }

    .order-info { display: flex; flex-direction: column; gap: 5px; }
    .info-row {
      display: flex;
      gap: 8px;
      font-size: 13px;
    }
    .info-key { color: var(--sub); flex: 0 0 64px; }
    .info-val { font-weight: 500; color: var(--text); }

    .order-card-bottom {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .desired-date { font-size: 13px; color: var(--sub); }
    .desired-date strong { color: var(--primary); }

    /* ── 캘린더 ── */
    .calendar-wrap { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }

    .cal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .cal-header h2 { font-size: 17px; font-weight: 700; }
    .cal-nav {
      display: flex;
      gap: 8px;
    }
    .cal-nav button {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 12px;
      color: var(--sub);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .cal-weekdays span:first-child { color: #ef4444; }
    .cal-weekdays span:last-child  { color: #3b82f6; }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .cal-cell {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 4px 2px;
      border-radius: 10px;
      cursor: pointer;
      position: relative;
    }
    .cal-cell:hover { background: var(--primary-light); }
    .cal-cell.empty { cursor: default; }
    .cal-cell.empty:hover { background: none; }
    .cal-cell.today .day-num {
      background: var(--primary);
      color: #fff;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .day-num {
      font-size: 13px;
      font-weight: 600;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cal-cell:nth-child(7n+1) .day-num { color: #ef4444; }
    .cal-cell:nth-child(7n)   .day-num { color: #3b82f6; }

    .cal-dots {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2px;
      margin-top: 2px;
    }
    .cal-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .cal-dot.daelye { background: #3b82f6; }
    .cal-dot.naver  { background: #ef4444; }

    /* 캘린더 아래 선택된 날짜 주문 */
    .cal-day-orders {
      margin-top: 16px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
      display: none;
    }
    .cal-day-orders.visible { display: block; }
    .cal-day-orders h3 {
      font-size: 14px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 10px;
    }

    /* ── 모달 ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 100;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 40px;
      width: 100%;
      max-width: 480px;
      max-height: 85vh;
      overflow-y: auto;
      animation: slideUp .25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .modal-handle {
      width: 40px;
      height: 4px;
      background: #ddd;
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }
    .modal-header h2 { font-size: 18px; font-weight: 700; }
    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #f0f0f0;
      border: none;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-fields { display: flex; flex-direction: column; gap: 0; margin-bottom: 20px; }
    .modal-field {
      display: flex;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .modal-field:last-child { border-bottom: none; }
    .modal-field-key { flex: 0 0 90px; color: var(--sub); }
    .modal-field-val { flex: 1; font-weight: 600; word-break: break-all; }

    .status-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .status-buttons h3 {
      grid-column: 1 / -1;
      font-size: 14px;
      color: var(--sub);
      font-weight: 600;
      margin-bottom: 4px;
    }
    .status-change-btn {
      padding: 10px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
    }
    .status-change-btn.pending   { border-color: var(--pending);   color: var(--pending); }
    .status-change-btn.paid      { border-color: var(--paid);      color: var(--paid); }
    .status-change-btn.completed { border-color: var(--completed); color: var(--completed); }
    .status-change-btn.active    { color: #fff; }
    .status-change-btn.pending.active   { background: var(--pending);   border-color: var(--pending); }
    .status-change-btn.paid.active      { background: var(--paid);      border-color: var(--paid); }
    .status-change-btn.completed.active { background: var(--completed); border-color: var(--completed); }

    .btn-delete {
      display: block;
      width: 100%;
      padding: 13px;
      background: var(--cancel-bg);
      color: var(--cancel);
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }

    /* ── 수정 버튼 ── */
    .btn-edit {
      display: block;
      width: 100%;
      padding: 13px;
      background: #EEF2FF;
      color: #4F46E5;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .btn-save {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .btn-cancel-edit {
      display: block;
      width: 100%;
      padding: 13px;
      background: #f0f0f0;
      color: var(--sub);
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .edit-form { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
    .edit-group { display: flex; flex-direction: column; gap: 5px; }
    .edit-group label { font-size: 12px; font-weight: 700; color: var(--sub); }
    .edit-input {
      padding: 11px 14px;
      background: #f5f5f5;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      outline: none;
    }
    .edit-input:focus { background: #efefef; }

    /* 네이버예약 배지 */
    .naver-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 50px;
      font-size: 11px;
      font-weight: 700;
      background: #e8f9ee;
      color: #03C75A;
      margin-top: 4px;
    }

    /* ── 생산현황 ── */
    .production-list { display: flex; flex-direction: column; gap: 10px; }
    .production-card {
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .production-info { display: flex; flex-direction: column; gap: 4px; }
    .production-name { font-size: 16px; font-weight: 700; }
    .production-dates { font-size: 12px; color: var(--sub); }
    .production-qty {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary);
      min-width: 60px;
      text-align: right;
    }
    .production-qty span { font-size: 14px; font-weight: 600; }
    .production-section-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--sub);
      margin: 16px 0 8px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    /* 플로팅 버튼 */
    .fab {
      position: fixed;
      bottom: 28px;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      border: none;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(108,63,255,.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      transition: transform .15s;
    }
    .fab:active { transform: scale(.92); }

    /* 출처 선택 */
    .source-selector {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 4px;
    }
    .source-btn {
      padding: 10px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: 13px;
      font-weight: 600;
      color: var(--sub);
      cursor: pointer;
      transition: all .15s;
      text-align: center;
    }
    .source-btn.active {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary);
    }

    /* 이미지 미리보기 */
    .img-preview {
      width: 100%;
      border-radius: 10px;
      object-fit: cover;
      max-height: 180px;
      margin-top: 8px;
      display: none;
    }

    /* 빈 상태 */
    .empty-state {
      text-align: center;
      padding: 48px 0;
      color: var(--sub);
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <div class="header">
    <div class="header-top">
      <h1>🎁 주문 대시보드</h1>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="header-date" id="todayLabel"></span>
        <button onclick="loadOrders()" style="background:rgba(255,255,255,.2);border:none;border-radius:50%;width:32px;height:32px;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;">↻</button>
      </div>
    </div>
    <div style="font-size:11px;opacity:.7;margin-bottom:8px;">오늘 포함 3일 기준</div>
    <div class="stat-grid">
      <div class="stat-card">
        <div class="num" id="statGift">0</div>
        <div class="lbl">답례품</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statPlace">0</div>
        <div class="lbl">스마트플레이스</div>
      </div>
    </div>
  </div>

  <!-- 탭 -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('production', this)">생산현황</button>
    <button class="tab-btn"        onclick="switchTab('list', this)">목록</button>
    <button class="tab-btn"        onclick="switchTab('calendar', this)">캘린더</button>
  </div>

  <!-- 생산현황 뷰 -->
  <div class="content" id="view-production">
    <div id="productionList"></div>
  </div>

  <!-- 목록 뷰 -->
  <div class="content" id="view-list" style="display:none;">
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterOrders('all', this)">전체</button>
      <button class="filter-btn" onclick="filterOrders('pending', this)">입금대기</button>
      <button class="filter-btn" onclick="filterOrders('paid', this)">입금확인</button>
      <button class="filter-btn" onclick="filterOrders('completed', this)">완료</button>
      <button class="filter-btn" onclick="filterOrders('cancelled', this)">취소</button>
    </div>
    <div class="order-list" id="orderList"></div>
  </div>

  <!-- 캘린더 뷰 -->
  <div class="content" id="view-calendar" style="display:none;">
    <div class="calendar-wrap">
      <div class="cal-header">
        <h2 id="calTitle"></h2>
        <div class="cal-nav">
          <button onclick="changeMonth(-1)">‹</button>
          <button onclick="changeMonth(1)">›</button>
        </div>
      </div>
      <div class="cal-weekdays">
        <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-day-orders" id="calDayOrders">
        <h3 id="calDayTitle"></h3>
        <div class="order-list" id="calDayList"></div>
      </div>
    </div>
  </div>

  <!-- 플로팅 버튼 -->
  <button class="fab" onclick="openEntryModal()">+</button>

  <!-- 수기입력 모달 -->
  <div class="modal-overlay" id="entryOverlay" onclick="closeEntryModal(event)">
    <div class="modal" id="entryModal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2>주문 직접 입력</h2>
        <button class="modal-close" onclick="closeEntryModalDirect()">✕</button>
      </div>

      <div class="edit-form">
        <!-- 출처 -->
        <div class="edit-group">
          <label>접수 경로</label>
          <div class="source-selector">
            <button class="source-btn active" data-source="전화주문"   onclick="selectSource(this)">📞 전화주문</button>
            <button class="source-btn"        data-source="현장방문"   onclick="selectSource(this)">🏪 현장방문</button>
            <button class="source-btn"        data-source="SNS/DM"     onclick="selectSource(this)">💬 SNS/DM</button>
            <button class="source-btn"        data-source="기타"       onclick="selectSource(this)">📝 기타</button>
          </div>
        </div>

        <!-- 고객 정보 -->
        <div class="edit-group"><label>고객명 *</label><input class="edit-input" id="entry_customer_name" placeholder="홍길동" /></div>
        <div class="edit-group"><label>연락처</label><input class="edit-input" id="entry_customer_phone" placeholder="010-0000-0000" /></div>

        <!-- 주문 정보 -->
        <div class="edit-group"><label>제품명</label><input class="edit-input" id="entry_product" placeholder="망고케이크" /></div>
        <div class="edit-group"><label>종류/옵션</label><input class="edit-input" id="entry_types" placeholder="1호, 생크림" /></div>
        <div class="edit-group"><label>수량</label><input class="edit-input" id="entry_quantity" placeholder="1" /></div>
        <div class="edit-group"><label>가격</label><input class="edit-input" id="entry_price" placeholder="45000" /></div>
        <div class="edit-group"><label>수령 날짜</label><input class="edit-input" id="entry_desired_date" type="date" /></div>

        <!-- 수령 방법 -->
        <div class="edit-group">
          <label>수령 방법</label>
          <div class="source-selector">
            <button class="source-btn active" data-delivery="pickup"   onclick="selectDelivery(this)">🏪 매장픽업</button>
            <button class="source-btn"        data-delivery="delivery" onclick="selectDelivery(this)">📦 택배</button>
          </div>
        </div>
        <div class="edit-group" id="entry_address_group" style="display:none;">
          <label>주소</label><input class="edit-input" id="entry_address" placeholder="배송 주소" />
        </div>

        <!-- 비고 -->
        <div class="edit-group"><label>비고/요청사항</label><input class="edit-input" id="entry_note" placeholder="요청사항 입력" /></div>

        <!-- 사진 -->
        <div class="edit-group">
          <label>사진</label>
          <input type="file" accept="image/*" id="entry_image_file" style="display:none" onchange="previewImage(event)" />
          <button class="edit-input" style="cursor:pointer;text-align:left;color:var(--sub)" onclick="document.getElementById('entry_image_file').click()">📷 사진 선택</button>
          <img id="entry_img_preview" class="img-preview" />
        </div>
      </div>

      <button class="btn-save" id="entry_submit_btn" onclick="submitManualOrder()">저장하기</button>
      <button class="btn-cancel-edit" onclick="closeEntryModalDirect()">취소</button>
    </div>
  </div>

  <!-- 모달 -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" id="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2 id="modalTitle">주문 상세</h2>
        <button class="modal-close" onclick="closeModalDirect()">✕</button>
      </div>
      <!-- 상세 보기 -->
      <div id="modalView">
        <div class="modal-fields" id="modalFields"></div>
        <div class="status-buttons">
          <h3>상태 변경</h3>
          <button class="status-change-btn pending"   data-status="입금대기" onclick="changeStatus('입금대기')">입금대기</button>
          <button class="status-change-btn paid"      data-status="입금확인" onclick="changeStatus('입금확인')">입금확인</button>
          <button class="status-change-btn completed" data-status="완료"    onclick="changeStatus('완료')">완료</button>
        </div>
        <button class="btn-edit" onclick="openEditMode()">✏️ 주문 수정</button>
        <button class="btn-delete" onclick="deleteOrder()">주문 삭제</button>
      </div>

      <!-- 수정 모드 -->
      <div id="modalEdit" style="display:none;">
        <div class="edit-form">
          <div class="edit-group"><label>고객명</label><input class="edit-input" id="edit_customer_name" /></div>
          <div class="edit-group"><label>연락처</label><input class="edit-input" id="edit_customer_phone" /></div>
          <div class="edit-group"><label>제품명</label><input class="edit-input" id="edit_product" /></div>
          <div class="edit-group"><label>종류</label><input class="edit-input" id="edit_types" /></div>
          <div class="edit-group"><label>수량</label><input class="edit-input" id="edit_quantity" /></div>
          <div class="edit-group"><label>가격</label><input class="edit-input" id="edit_price" /></div>
          <div class="edit-group"><label>날짜</label><input class="edit-input" id="edit_desired_date" type="date" /></div>
          <div class="edit-group"><label>비고</label><input class="edit-input" id="edit_note" /></div>
          <div class="edit-group"><label>주소</label><input class="edit-input" id="edit_address" /></div>
        </div>
        <button class="btn-save" onclick="saveEdit()">저장하기</button>
        <button class="btn-cancel-edit" onclick="closeEditMode()">취소</button>
      </div>
    </div>
  </div>

  <script>
    let orders = [];
    const STATUS_LABEL = { '입금대기': '입금대기', '입금확인': '입금확인', '완료': '완료', '취소': '취소', '결제완료': '결제완료' };
    const STATUS_CLASS  = { '입금대기': 'pending', '입금확인': 'paid', '완료': 'completed', '취소': 'cancelled', '결제완료': 'paid' };
    let currentFilter = 'all';
    let currentOrderId = null;
    let calYear, calMonth;

    const today = new Date();
    calYear  = today.getFullYear();
    calMonth = today.getMonth();

    document.getElementById('todayLabel').textContent =
      `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;

    // 오늘~+2일 날짜 범위
    function getDateRange() {
      const dates = [];
      for (let i = 0; i < 3; i++) {
        const d = new Date(today);
        d.setDate(d.getDate() + i);
        dates.push(d.toISOString().slice(0, 10));
      }
      return dates; // [오늘, 내일, 모레]
    }

    // ── Supabase 연동 ──
    async function loadOrders() {
      const res = await fetch('/api/orders');
      if (!res.ok) return;
      orders = await res.json();
      updateStats();
      renderProduction();
    }

    async function changeStatus(status) {
      if (!currentOrderId) return;
      await fetch('/api/orders', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: currentOrderId, status }),
      });
      const o = orders.find(x => x.id === currentOrderId);
      if (o) o.status = status;
      document.querySelectorAll('.status-change-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.status === status);
      });
      updateStats();
      renderList();
    }

    async function deleteOrder() {
      if (!currentOrderId) return;
      if (!confirm('이 주문을 삭제할까요?')) return;
      await fetch('/api/orders', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: currentOrderId }),
      });
      orders = orders.filter(o => o.id !== currentOrderId);
      closeModalDirect();
      updateStats();
      renderList();
    }

    // ── 탭 전환 ──
    function switchTab(name, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('view-production').style.display = name === 'production' ? 'block' : 'none';
      document.getElementById('view-list').style.display       = name === 'list'       ? 'block' : 'none';
      document.getElementById('view-calendar').style.display   = name === 'calendar'   ? 'block' : 'none';
      if (name === 'list')     renderList();
      if (name === 'calendar') renderCalendar();
    }

    // ── 생산현황 ──
    function renderProduction() {
      const range = getDateRange(); // 오늘~모레
      const confirmed = ['입금확인', '결제완료', '입금대기'];

      const filtered = orders.filter(o =>
        confirmed.includes(o.status) &&
        o.desired_date && range.includes(o.desired_date.slice(0, 10))
      );

      const rangeLabel = `${range[0].slice(5).replace('-','/')} ~ ${range[2].slice(5).replace('-','/')}`;

      if (filtered.length === 0) {
        document.getElementById('productionList').innerHTML =
          `<div class="empty-state"><div class="icon">🎂</div><p>생산 예정 주문이 없어요</p></div>`;
        return;
      }

      function groupOrders(list) {
        const grouped = {};
        list.forEach(o => {
          const key = (o.product || '미정') + (o.types ? ' / ' + o.types : '');
          if (!grouped[key]) grouped[key] = { name: o.product || '미정', types: o.types || '', qty: 0, dates: [] };
          const qty = parseInt(o.quantity) || 1;
          grouped[key].qty += qty;
          const d = o.desired_date.slice(0, 10);
          if (!grouped[key].dates.includes(d)) grouped[key].dates.push(d);
        });
        return Object.values(grouped).sort((a, b) => a.dates[0].localeCompare(b.dates[0]));
      }

      function buildCards(sortedItems) {
        return sortedItems.map(item => {
          const dates = item.dates.sort().map(d => {
            const [,m,day] = d.split('-');
            return `${parseInt(m)}/${parseInt(day)}`;
          }).join(', ');
          const label = item.name + (item.types ? ` <span style="font-weight:500;color:var(--sub)">${item.types}</span>` : '');
          return `
            <div class="production-card">
              <div class="production-info">
                <div class="production-name">${label}</div>
                <div class="production-dates">수령일: ${dates}</div>
              </div>
              <div class="production-qty">${item.qty}<span>개</span></div>
            </div>`;
        }).join('');
      }

      const giftOrders  = filtered.filter(o => o.source !== '네이버예약');
      const placeOrders = filtered.filter(o => o.source === '네이버예약');

      let html = '';

      if (giftOrders.length > 0) {
        const sorted = groupOrders(giftOrders);
        html += `<div class="production-section-title">답례품 · ${rangeLabel}</div>
                 <div class="production-list">${buildCards(sorted)}</div>`;
      }

      if (placeOrders.length > 0) {
        const sorted = groupOrders(placeOrders);
        html += `<div class="production-section-title" style="margin-top:${giftOrders.length > 0 ? '20px' : '16px'}">스마트플레이스 · ${rangeLabel}</div>
                 <div class="production-list">${buildCards(sorted)}</div>`;
      }

      document.getElementById('productionList').innerHTML = html;
    }

    // ── 통계 (오늘~+2일 기준) ──
    function updateStats() {
      const range = getDateRange();
      const inRange = o => o.desired_date && range.includes(o.desired_date.slice(0, 10));
      document.getElementById('statGift').textContent  = orders.filter(o => inRange(o) && o.source !== '네이버예약').length;
      document.getElementById('statPlace').textContent = orders.filter(o => inRange(o) && o.source === '네이버예약').length;
    }

    // ── 카드 HTML ──
    function orderCardHTML(o, mini = false) {
      const cls = STATUS_CLASS[o.status] || 'pending';
      return `
        <div class="order-card" onclick="openModal('${o.id}')">
          <div class="order-card-top">
            <div>
              <div class="customer-name">${o.customer_name}</div>
              <div class="customer-phone">${o.customer_phone || ''}</div>
              ${o.source === '네이버예약' ? '<span class="naver-badge">N 네이버예약</span>' : ''}
            </div>
            <span class="status-badge ${cls}">${o.status}</span>
          </div>
          <div class="order-info">
            <div class="info-row"><span class="info-key">제품</span><span class="info-val">${o.product || '-'}</span></div>
            <div class="info-row"><span class="info-key">종류</span><span class="info-val">${o.types || '-'}</span></div>
            ${!mini ? `<div class="info-row"><span class="info-key">수량</span><span class="info-val">${o.quantity || '-'}</span></div>` : ''}
            ${!mini && o.note ? `<div class="info-row"><span class="info-key">비고</span><span class="info-val">${o.note}</span></div>` : ''}
          </div>
          <div class="order-card-bottom">
            <span class="desired-date">가격: <strong>${o.price || '-'}</strong></span>
            <span style="font-size:12px;color:var(--sub)">${formatDate(o.created_at)}</span>
          </div>
        </div>`;
    }

    // ── 목록 렌더 (취소 포함) ──
    function renderList() {
      const filtered = currentFilter === 'all'
        ? orders
        : orders.filter(o => STATUS_CLASS[o.status] === currentFilter);
      const container = document.getElementById('orderList');
      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>주문이 없어요</p></div>`;
        return;
      }
      // 취소 주문은 맨 아래로
      const sorted = [...filtered].sort((a, b) => {
        const aC = a.status === '취소' ? 1 : 0;
        const bC = b.status === '취소' ? 1 : 0;
        return aC - bC;
      });
      container.innerHTML = sorted.map(o => orderCardHTML(o)).join('');
    }

    function filterOrders(status, btn) {
      currentFilter = status;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderList();
    }

    // ── 캘린더 ──
    function renderCalendar() {
      document.getElementById('calTitle').textContent = `${calYear}년 ${calMonth + 1}월`;
      const firstDay = new Date(calYear, calMonth, 1).getDay();
      const lastDate = new Date(calYear, calMonth + 1, 0).getDate();

      const ordersByDate = {};
      orders.forEach(o => {
        const d = o.desired_date ? o.desired_date.slice(0, 10) : null;
        if (!d) return;
        if (!ordersByDate[d]) ordersByDate[d] = [];
        ordersByDate[d].push(o);
      });

      let html = '';
      for (let i = 0; i < firstDay; i++) html += `<div class="cal-cell empty"></div>`;
      for (let d = 1; d <= lastDate; d++) {
        const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isToday = (calYear === today.getFullYear() && calMonth === today.getMonth() && d === today.getDate());
        const dayOrders = ordersByDate[dateStr] || [];
        const dots = dayOrders.slice(0,4).map(o => {
          if (o.source === '네이버예약')  return `<div class="cal-dot naver"></div>`;
          return `<div class="cal-dot daelye"></div>`;
        }).join('');
        html += `<div class="cal-cell ${isToday ? 'today' : ''}" onclick="selectCalDay('${dateStr}')">
          <div class="day-num">${d}</div>
          <div class="cal-dots">${dots}</div>
        </div>`;
      }
      document.getElementById('calGrid').innerHTML = html;
      document.getElementById('calDayOrders').classList.remove('visible');
    }

    function changeMonth(dir) {
      calMonth += dir;
      if (calMonth < 0)  { calMonth = 11; calYear--; }
      if (calMonth > 11) { calMonth = 0;  calYear++; }
      renderCalendar();
    }

    function selectCalDay(dateStr) {
      const dayOrders = orders.filter(o => o.desired_date && o.desired_date.slice(0,10) === dateStr);
      const section = document.getElementById('calDayOrders');
      const [y, m, d] = dateStr.split('-');
      document.getElementById('calDayTitle').textContent = `${y}년 ${parseInt(m)}월 ${parseInt(d)}일 주문 (${dayOrders.length}건)`;
      const list = document.getElementById('calDayList');
      list.innerHTML = dayOrders.length === 0
        ? `<div class="empty-state"><div class="icon">📭</div><p>이 날 주문이 없어요</p></div>`
        : dayOrders.map(o => orderCardHTML(o, true)).join('');
      section.classList.add('visible');
      setTimeout(() => section.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
    }

    // ── 모달 ──
    function openModal(id) {
      const o = orders.find(x => x.id === id);
      if (!o) return;
      currentOrderId = id;
      const cls = STATUS_CLASS[o.status] || 'pending';

      document.getElementById('modalTitle').textContent = `${o.customer_name} 주문`;
      document.getElementById('modalFields').innerHTML = `
        <div class="modal-field"><span class="modal-field-key">고객명</span><span class="modal-field-val">${o.customer_name}</span></div>
        <div class="modal-field"><span class="modal-field-key">연락처</span><span class="modal-field-val">${o.customer_phone}</span></div>
        <div class="modal-field"><span class="modal-field-key">제품명</span><span class="modal-field-val">${o.product || '-'}</span></div>
        <div class="modal-field"><span class="modal-field-key">종류</span><span class="modal-field-val">${o.types || '-'}</span></div>
        <div class="modal-field"><span class="modal-field-key">수량</span><span class="modal-field-val">${o.quantity || '-'}</span></div>
        <div class="modal-field"><span class="modal-field-key">가격</span><span class="modal-field-val">${o.price || '-'}</span></div>
        <div class="modal-field"><span class="modal-field-key">수령방법</span><span class="modal-field-val">${o.delivery === 'delivery' ? '📦 택배' : '🏪 매장 픽업'}</span></div>
        ${o.address ? `<div class="modal-field"><span class="modal-field-key">주소</span><span class="modal-field-val">${o.address}</span></div>` : ''}
        ${o.image_url ? `<div class="modal-field" style="flex-direction:column;gap:8px;"><span class="modal-field-key">사진</span><img src="${o.image_url}" style="width:100%;border-radius:10px;object-fit:cover;max-height:200px;" /></div>` : ''}
        <div class="modal-field"><span class="modal-field-key">날짜</span><span class="modal-field-val">${o.desired_date ? o.desired_date.replace(/-/g,'.') : '-'}</span></div>
        <div class="modal-field"><span class="modal-field-key">비고</span><span class="modal-field-val">${o.note || '-'}</span></div>
        <div class="modal-field"><span class="modal-field-key">주문일시</span><span class="modal-field-val">${formatDate(o.created_at)}</span></div>
        ${o.source === '네이버예약' ? '<div class="modal-field"><span class="modal-field-key">접수경로</span><span class="modal-field-val"><span class="naver-badge">N 네이버예약</span></span></div>' : ''}
      `;

      document.querySelectorAll('.status-change-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.status === o.status);
      });
      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal(e) {
      if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
    }
    function closeModalDirect() {
      document.getElementById('modalOverlay').classList.remove('open');
      closeEditMode();
      currentOrderId = null;
    }

    function openEditMode() {
      const o = orders.find(x => x.id === currentOrderId);
      if (!o) return;
      document.getElementById('edit_customer_name').value  = o.customer_name || '';
      document.getElementById('edit_customer_phone').value = o.customer_phone || '';
      document.getElementById('edit_product').value        = o.product || '';
      document.getElementById('edit_types').value          = o.types || '';
      document.getElementById('edit_quantity').value       = o.quantity || '';
      document.getElementById('edit_price').value          = o.price || '';
      document.getElementById('edit_desired_date').value   = o.desired_date || '';
      document.getElementById('edit_note').value           = o.note || '';
      document.getElementById('edit_address').value        = o.address || '';
      document.getElementById('modalView').style.display = 'none';
      document.getElementById('modalEdit').style.display = 'block';
    }

    function closeEditMode() {
      document.getElementById('modalView').style.display = 'block';
      document.getElementById('modalEdit').style.display = 'none';
    }

    async function saveEdit() {
      const btn = document.querySelector('.btn-save');
      btn.textContent = '저장 중...';
      btn.disabled = true;

      const updated = {
        id:             currentOrderId,
        customer_name:  document.getElementById('edit_customer_name').value.trim(),
        customer_phone: document.getElementById('edit_customer_phone').value.trim(),
        product:        document.getElementById('edit_product').value.trim(),
        types:          document.getElementById('edit_types').value.trim(),
        quantity:       document.getElementById('edit_quantity').value.trim(),
        price:          document.getElementById('edit_price').value.trim(),
        desired_date:   document.getElementById('edit_desired_date').value || null,
        note:           document.getElementById('edit_note').value.trim(),
        address:        document.getElementById('edit_address').value.trim(),
      };

      const res = await fetch('/api/orders', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(updated),
      });

      if (res.ok) {
        const o = orders.find(x => x.id === currentOrderId);
        if (o) Object.assign(o, updated);
        closeEditMode();
        openModal(currentOrderId);
        updateStats();
        renderList();
      } else {
        alert('저장 실패');
      }

      btn.textContent = '저장하기';
      btn.disabled = false;
    }

    // ── 날짜 포맷 ──
    function formatDate(str) {
      if (!str) return '-';
      return str.slice(0, 10).replace(/-/g, '.');
    }

    // ── 수기입력 모달 ──
    let entrySource   = '전화주문';
    let entryDelivery = 'pickup';
    let entryImageB64 = null;
    let entryImageName = null;
    let entryImageType = null;

    function openEntryModal() {
      entrySource = '전화주문';
      entryDelivery = 'pickup';
      entryImageB64 = null;
      document.getElementById('entry_customer_name').value  = '';
      document.getElementById('entry_customer_phone').value = '';
      document.getElementById('entry_product').value        = '';
      document.getElementById('entry_types').value          = '';
      document.getElementById('entry_quantity').value       = '';
      document.getElementById('entry_price').value          = '';
      document.getElementById('entry_desired_date').value   = '';
      document.getElementById('entry_note').value           = '';
      document.getElementById('entry_address').value        = '';
      document.getElementById('entry_image_file').value     = '';
      document.getElementById('entry_img_preview').style.display = 'none';
      document.getElementById('entry_address_group').style.display = 'none';
      document.querySelectorAll('.source-selector .source-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('[data-source="전화주문"]').classList.add('active');
      document.querySelector('[data-delivery="pickup"]').classList.add('active');
      document.getElementById('entryOverlay').classList.add('open');
    }

    function closeEntryModal(e) {
      if (e.target === document.getElementById('entryOverlay')) closeEntryModalDirect();
    }
    function closeEntryModalDirect() {
      document.getElementById('entryOverlay').classList.remove('open');
    }

    function selectSource(btn) {
      document.querySelectorAll('[data-source]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      entrySource = btn.dataset.source;
    }

    function selectDelivery(btn) {
      document.querySelectorAll('[data-delivery]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      entryDelivery = btn.dataset.delivery;
      document.getElementById('entry_address_group').style.display = entryDelivery === 'delivery' ? 'block' : 'none';
    }

    function previewImage(e) {
      const file = e.target.files[0];
      if (!file) return;
      entryImageName = file.name;
      entryImageType = file.type;
      const reader = new FileReader();
      reader.onload = function(ev) {
        entryImageB64 = ev.target.result.split(',')[1];
        const preview = document.getElementById('entry_img_preview');
        preview.src = ev.target.result;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    async function submitManualOrder() {
      const name = document.getElementById('entry_customer_name').value.trim();
      if (!name) { alert('고객명을 입력해주세요.'); return; }

      const btn = document.getElementById('entry_submit_btn');
      btn.textContent = '저장 중...';
      btn.disabled = true;

      let image_url = null;
      if (entryImageB64) {
        const upRes = await fetch('/api/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ base64: entryImageB64, filename: entryImageName, contentType: entryImageType }),
        });
        if (upRes.ok) {
          const upData = await upRes.json();
          image_url = upData.url;
        }
      }

      const payload = {
        customer_name:  name,
        customer_phone: document.getElementById('entry_customer_phone').value.trim(),
        product:        document.getElementById('entry_product').value.trim(),
        types:          document.getElementById('entry_types').value.trim(),
        quantity:       document.getElementById('entry_quantity').value.trim(),
        price:          document.getElementById('entry_price').value.trim(),
        desired_date:   document.getElementById('entry_desired_date').value || null,
        note:           document.getElementById('entry_note').value.trim(),
        delivery:       entryDelivery,
        address:        document.getElementById('entry_address').value.trim(),
        source:         entrySource,
        image_url,
      };

      const res = await fetch('/api/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      if (res.ok) {
        closeEntryModalDirect();
        await loadOrders();
      } else {
        alert('저장 실패. 다시 시도해주세요.');
      }

      btn.textContent = '저장하기';
      btn.disabled = false;
    }

    // ── 초기 로드 ──
    loadOrders();
  </script>
</body>
</html>
