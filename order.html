<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주문 확인</title>
  <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #F97316;
      --primary-light: #FFF7ED;
      --text: #1A1A1A;
      --sub: #999;
      --border: #EBEBEB;
      --input-bg: #F5F5F5;
      --bg: #fff;
    }

    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
    }

    /* ── 헤더 ── */
    .header {
      padding: 28px 24px 0;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      line-height: 1.3;
    }
    .header p {
      font-size: 13px;
      color: var(--sub);
      margin-top: 4px;
    }

    /* ── 스텝 탭 ── */
    .steps {
      display: flex;
      padding: 0 24px;
      margin-top: 24px;
      border-bottom: 1.5px solid var(--border);
    }
    .step {
      flex: 1;
      text-align: center;
      padding-bottom: 12px;
      font-size: 13px;
      font-weight: 600;
      color: var(--sub);
      border-bottom: 2.5px solid transparent;
      margin-bottom: -1.5px;
      cursor: default;
    }
    .step.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    .step.done { color: var(--sub); }

    /* ── 뷰 ── */
    .view { display: none; }
    .view.active { display: block; }

    /* ── 섹션 ── */
    .section {
      padding: 24px 24px 0;
    }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--sub);
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: .3px;
    }

    /* ── 수령 방법 선택 ── */
    .delivery-toggle {
      display: flex;
      background: var(--input-bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 14px;
    }
    .delivery-btn {
      flex: 1;
      padding: 11px;
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--sub);
      cursor: pointer;
      transition: all .2s;
    }
    .delivery-btn.active {
      background: #fff;
      color: var(--primary);
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
    }

    /* ── 입력 그룹 ── */
    .input-group {
      margin-bottom: 14px;
    }
    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 7px;
    }
    .input-group label .req {
      color: var(--primary);
      margin-left: 2px;
    }
    .input-field {
      width: 100%;
      padding: 14px 16px;
      background: var(--input-bg);
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: background .15s;
    }
    .input-field:focus { background: #EFEFEF; }
    .input-field::placeholder { color: #C0C0C0; }

    /* ── 버튼 ── */
    .btn-primary {
      display: block;
      width: calc(100% - 48px);
      margin: 20px 24px 0;
      padding: 16px;
      background: var(--primary);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-primary:active { opacity: .85; }

    .btn-secondary {
      display: block;
      width: calc(100% - 48px);
      margin: 10px 24px 0;
      padding: 15px;
      background: var(--input-bg);
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-secondary:active { background: #E8E8E8; }

    /* ── 링크 박스 ── */
    .link-box {
      margin: 20px 24px 0;
      padding: 16px;
      background: #F0FDF4;
      border-radius: 12px;
    }
    .link-box-label {
      font-size: 12px;
      font-weight: 700;
      color: #16A34A;
      margin-bottom: 8px;
    }
    .link-text {
      font-size: 12px;
      color: #166534;
      word-break: break-all;
      line-height: 1.6;
    }
    .btn-copy {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 13px;
      background: #16A34A;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    .btn-preview {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 13px;
      background: var(--input-bg);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    /* ── 주문 필드 리스트 (2단계) ── */
    .field-list {
      margin: 0 24px;
    }
    .field-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      gap: 16px;
    }
    .field-row:last-child { border-bottom: none; }
    .field-key {
      font-size: 14px;
      color: var(--sub);
      flex-shrink: 0;
      width: 90px;
    }
    .field-val {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      text-align: right;
      word-break: break-all;
    }
    .field-val.price {
      color: var(--primary);
      font-size: 16px;
    }
    .field-val.empty {
      color: #CCC;
      font-weight: 400;
    }

    /* ── 주문 요약 (3단계) ── */
    .summary-box {
      margin: 0 24px;
      background: var(--primary-light);
      border-radius: 12px;
      padding: 4px 16px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #FFE8D0;
      font-size: 13px;
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-key { color: #C2410C; font-weight: 600; }
    .summary-val { color: var(--text); font-weight: 700; }

    /* ── 토스트 ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(0,0,0,.75);
      color: #fff;
      padding: 11px 22px;
      border-radius: 50px;
      font-size: 14px;
      opacity: 0;
      transition: all .25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    .bottom-pad { height: 48px; }

    /* ── 주소검색 오버레이 ── */
    #postcodeOverlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 9999;
      background: #fff;
    }
    #postcodeOverlay.open { display: block; }
    #postcodeHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      height: 56px;
      border-bottom: 1px solid var(--border);
      box-sizing: border-box;
    }
    #postcodeHeader span { font-size: 16px; font-weight: 700; }
    #postcodeClose {
      background: none; border: none;
      font-size: 22px; cursor: pointer; color: var(--sub);
    }
    #postcodeWrap {
      width: 100%;
      height: calc(100% - 56px);
    }

    /* ── 4단계: 계좌 안내 ── */
    .complete-icon {
      text-align: center;
      font-size: 52px;
      padding: 32px 0 8px;
    }
    .complete-title {
      text-align: center;
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 4px;
    }
    .complete-sub {
      text-align: center;
      font-size: 13px;
      color: var(--sub);
      margin-bottom: 32px;
    }
    .account-card {
      margin: 0 24px;
      background: var(--primary-light);
      border-radius: 16px;
      padding: 24px;
    }
    .account-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .account-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #FFE8D0;
      font-size: 14px;
    }
    .account-row:last-of-type { border-bottom: none; }
    .account-key { color: #C2410C; font-weight: 600; }
    .account-num {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      text-align: center;
      padding: 16px 0 4px;
      letter-spacing: 1px;
    }
    .btn-copy-account {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 15px;
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-copy-account:active { opacity: .85; }
    .account-notice {
      margin: 16px 24px 0;
      font-size: 12px;
      color: var(--sub);
      line-height: 1.7;
      text-align: center;
    }
    .account-notice strong { color: var(--primary); }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <div class="header">
    <h1>🎁 답례품 주문</h1>
    <p>주문 내용을 확인하고 정보를 입력해주세요</p>
  </div>

  <!-- 스텝 탭 -->
  <div class="steps">
    <div class="step active" id="step1">주문 입력</div>
    <div class="step" id="step2">주문 확인</div>
    <div class="step" id="step3">정보 입력</div>
    <div class="step" id="step4">입금 안내</div>
  </div>

  <!-- 1단계: 주문 내용 직접 입력 (운영자) -->
  <div class="view active" id="view1">
    <div class="section" style="margin-top:8px;">
      <div class="input-group">
        <label>제품명 <span class="req">*</span></label>
        <input class="input-field" id="inputProduct" type="text" placeholder="예) 구움과자" />
      </div>
      <div class="input-group">
        <label>구움과자 종류 <span class="req">*</span></label>
        <input class="input-field" id="inputTypes" type="text" placeholder="예) 플레인, 무화과, 솔티드, 두바이" />
      </div>
      <div class="input-group">
        <label>박스 갯수</label>
        <input class="input-field" id="inputQuantity" type="text" placeholder="예) 3구 박스 1개" />
      </div>
      <div class="input-group">
        <label>가격 <span class="req">*</span></label>
        <input class="input-field" id="inputPrice" type="text" placeholder="예) 274,000원" />
      </div>
      <div class="input-group">
        <label>날짜 <span class="req">*</span></label>
        <input class="input-field" id="inputDate" type="date" />
      </div>

      <div class="input-group">
        <label>비고 <span style="color:var(--sub);font-weight:400;">(선택)</span></label>
        <input class="input-field" id="inputNote" type="text" placeholder="예) 스티커 포함 등" />
      </div>

      <div class="input-group">
        <label>사진 <span style="color:var(--sub);font-weight:400;">(선택)</span></label>
        <input type="file" id="inputImage" accept="image/*" style="display:none;" onchange="previewImage(this)" />
        <div id="imageUploadBox" onclick="document.getElementById('inputImage').click()"
          style="width:100%;min-height:100px;background:var(--input-bg);border-radius:10px;
                 display:flex;flex-direction:column;align-items:center;justify-content:center;
                 cursor:pointer;gap:6px;padding:16px;box-sizing:border-box;">
          <div style="font-size:28px;">📷</div>
          <div style="font-size:13px;color:var(--sub);">탭하여 사진 추가</div>
        </div>
        <div id="imageStatus" style="font-size:12px;margin-top:6px;color:var(--sub);display:none;"></div>
      </div>

      <div class="input-group">
        <label>수령 방법 <span class="req">*</span></label>
        <div class="delivery-toggle">
          <button class="delivery-btn active" id="btnPickup" onclick="setDelivery('pickup')">🏪 매장 픽업</button>
          <button class="delivery-btn" id="btnDelivery" onclick="setDelivery('delivery')">📦 택배</button>
        </div>
      </div>

    </div>

    <button class="btn-primary" onclick="goToSummary()">고객 링크 만들기 →</button>

    <!-- 링크 생성 영역 -->
    <div id="linkCard" style="display:none;">
      <div class="link-box" style="margin-top:20px; margin-left:24px; margin-right:24px;">
        <div class="link-box-label">✓ 고객 링크 생성 완료</div>
        <div class="link-text" id="generatedLink"></div>
        <button class="btn-copy" onclick="copyLink()">링크 복사하기</button>
        <button class="btn-preview" onclick="previewAsCustomer()">고객 화면 미리보기</button>
      </div>
    </div>
  </div>

  <!-- 2단계: 주문 내용 확인 -->
  <div class="view" id="view2">
    <div class="section" style="margin-top:8px; padding-bottom:0;">
      <div class="section-title">주문 내용</div>
    </div>
    <div class="field-list">
      <div class="field-row">
        <span class="field-key">제품명</span>
        <span class="field-val" id="fieldProduct"></span>
      </div>
      <div class="field-row">
        <span class="field-key">구움과자 종류</span>
        <span class="field-val" id="fieldTypes"></span>
      </div>
      <div class="field-row">
        <span class="field-key">박스 갯수</span>
        <span class="field-val" id="fieldQuantity"></span>
      </div>
      <div class="field-row">
        <span class="field-key">가격</span>
        <span class="field-val price" id="fieldPrice"></span>
      </div>
      <div class="field-row">
        <span class="field-key">비고</span>
        <span class="field-val" id="fieldNote"></span>
      </div>
      <div class="field-row">
        <span class="field-key">날짜</span>
        <span class="field-val" id="fieldDate"></span>
      </div>
      <div class="field-row">
        <span class="field-key">수령 방법</span>
        <span class="field-val" id="fieldDelivery"></span>
      </div>
      <div class="field-row" id="fieldAddressRow">
        <span class="field-key">배송 주소</span>
        <span class="field-val" id="fieldAddress"></span>
      </div>
    </div>

    <button class="btn-primary" onclick="goToStep(3)">이 내용으로 진행하기 →</button>
    <button class="btn-secondary" onclick="goToStep(1)">← 다시 입력하기</button>
  </div>

  <!-- 3단계: 고객 정보 입력 -->
  <div class="view" id="view3">
    <div class="section" style="margin-top:8px;">
      <div class="input-group">
        <label>고객명 <span class="req">*</span></label>
        <input class="input-field" id="customerName" type="text" placeholder="이름을 입력해주세요" />
      </div>
      <div class="input-group">
        <label>핸드폰 번호 <span class="req">*</span></label>
        <input class="input-field" id="customerPhone" type="tel"
               placeholder="010-0000-0000" oninput="formatPhone(this)" />
      </div>

      <!-- 택배일 때만 표시 -->
      <div id="addressSection" style="display:none;">
        <div class="input-group">
          <label>배송 주소 <span class="req">*</span></label>
          <div style="display:flex; gap:8px;">
            <input class="input-field" id="customerAddress" type="text"
                   placeholder="주소 검색을 눌러주세요" readonly
                   style="flex:1; cursor:pointer;" onclick="searchAddress()" />
            <button type="button" onclick="searchAddress()"
                    style="flex-shrink:0; padding:0 16px; background:var(--primary); color:#fff;
                           border:none; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap;">
              주소 검색
            </button>
          </div>
        </div>
        <div class="input-group">
          <label>상세 주소</label>
          <input class="input-field" id="customerAddressDetail" type="text"
                 placeholder="동/호수 등 상세 주소" />
        </div>
      </div>
    </div>

    <div class="section" style="margin-top:20px; padding-bottom:0;">
      <div class="section-title">주문 내용 확인</div>
    </div>
    <div class="summary-box">
      <div id="orderSummaryPreview"></div>
    </div>

    <button class="btn-primary" onclick="submitOrder()">주문 확인 완료 →</button>
    <button class="btn-secondary" onclick="goToStep(2)">← 주문 내용 수정</button>
  </div>

  <!-- 4단계: 계좌 안내 -->
  <div class="view" id="view4">
    <div class="complete-icon">🎉</div>
    <div class="complete-title">주문이 확인됐어요!</div>
    <div class="complete-sub">아래 계좌로 입금해 주시면 주문이 확정됩니다</div>

    <div class="account-card">
      <div class="account-label">입금 계좌</div>
      <div class="account-row">
        <span class="account-key">입금 금액</span>
        <span id="displayAmount" style="font-weight:800; color:#F97316; font-size:16px;"></span>
      </div>
      <div class="account-row">
        <span class="account-key">은행</span>
        <span id="displayBank"></span>
      </div>
      <div class="account-row">
        <span class="account-key">예금주</span>
        <span id="displayHolder"></span>
      </div>
      <div class="account-num" id="displayNumber"></div>
      <button class="btn-copy-account" id="copyAccountBtn" onclick="copyAccount()">계좌번호 복사하기</button>
    </div>

    <p class="account-notice">
      입금자명을 <strong>주문자 이름</strong>과 동일하게 해주세요.<br />
      입금 확인 후 주문이 최종 확정됩니다.
    </p>
  </div>

  <!-- 주소검색 오버레이 -->
  <div id="postcodeOverlay">
    <div id="postcodeHeader">
      <span>주소 검색</span>
      <button id="postcodeClose" onclick="closePostcode()">✕</button>
    </div>
    <div id="postcodeWrap"></div>
  </div>

  <div class="bottom-pad"></div>
  <div class="toast" id="toast"></div>

  <script>
    // ★ 계좌 정보 여기서 수정하세요
    const BANK_NAME    = '우리은행';
    const BANK_HOLDER  = '최은희';
    const BANK_NUMBER  = '01025511407';

    let parsedOrder = { product: '', types: '', quantity: '', price: '', note: '', desired_date: '', delivery: 'pickup', address: '', image_url: '' };
    let uploadedImageUrl = '';
    let deliveryMode = 'pickup';

    function previewImage(input) {
      const file = input.files[0];
      if (!file) return;

      const box = document.getElementById('imageUploadBox');
      const status = document.getElementById('imageStatus');
      const reader = new FileReader();

      reader.onload = async function(e) {
        const base64 = e.target.result.split(',')[1];
        box.innerHTML = `<img src="${e.target.result}" style="max-width:100%;max-height:200px;border-radius:8px;object-fit:cover;" />`;
        status.style.display = 'block';
        status.style.color = 'var(--sub)';
        status.textContent = '업로드 중...';

        try {
          const res = await fetch('/api/upload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ base64, filename: file.name, contentType: file.type }),
          });
          const json = await res.json();
          if (!res.ok) throw new Error(json.error);
          uploadedImageUrl = json.url;
          status.style.color = '#10b981';
          status.textContent = '✓ 사진 업로드 완료';
        } catch(e) {
          status.style.color = '#ef4444';
          status.textContent = '업로드 실패: ' + e.message;
          uploadedImageUrl = '';
        }
      };
      reader.readAsDataURL(file);
    }

    function setDelivery(mode) {
      deliveryMode = mode;
      document.getElementById('btnPickup').classList.toggle('active', mode === 'pickup');
      document.getElementById('btnDelivery').classList.toggle('active', mode === 'delivery');
      document.getElementById('addressGroup').style.display = mode === 'delivery' ? 'block' : 'none';
    }

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('c');
      const dataParam = params.get('d');

      if (code) {
        try {
          const url = `https://orvwmmrqyqgbjcyiqqqr.supabase.co/storage/v1/object/public/order-links/${code}.json`;
          const res = await fetch(url);
          parsedOrder = await res.json();
        } catch(e) {
          parsedOrder = { product:'', types:'', quantity:'', price:'', note:'' };
        }
        renderOrderFields(parsedOrder);
        document.getElementById('step1').style.display = 'none';
        goToStep(2);
      } else if (dataParam) {
        try { parsedOrder = JSON.parse(decodeURIComponent(atob(dataParam))); }
        catch(e) { parsedOrder = { product:'', types:'', quantity:'', price:'', note:'' }; }
        renderOrderFields(parsedOrder);
        document.getElementById('step1').style.display = 'none';
        goToStep(2);
      }
    }

    async function goToSummary() {
      const product      = document.getElementById('inputProduct').value.trim();
      const types        = document.getElementById('inputTypes').value.trim();
      const quantity     = document.getElementById('inputQuantity').value.trim();
      const price        = document.getElementById('inputPrice').value.trim();
      const note         = document.getElementById('inputNote').value.trim();
      const desired_date = document.getElementById('inputDate').value;
      if (!product)      { showToast('제품명을 입력해주세요.'); return; }
      if (!price)        { showToast('가격을 입력해주세요.'); return; }
      if (!desired_date) { showToast('날짜를 입력해주세요.'); return; }

      parsedOrder = { product, types, quantity, price, note, desired_date, delivery: deliveryMode, address: '', image_url: uploadedImageUrl };
      renderOrderFields(parsedOrder);

      const btn = document.querySelector('.btn-primary');
      btn.disabled = true;
      btn.textContent = '링크 생성 중...';

      try {
        const res = await fetch('/api/create-link', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(parsedOrder),
        });
        const json = await res.json();
        if (!res.ok) throw new Error(json.error);
        const url = `${location.origin}${location.pathname}?c=${json.code}`;
        document.getElementById('generatedLink').textContent = url;
        document.getElementById('linkCard').style.display = 'block';
        document.getElementById('linkCard').scrollIntoView({ behavior: 'smooth' });
      } catch(e) {
        showToast('링크 생성 실패: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '고객 링크 만들기 →';
      }
    }

    function renderOrderFields(data) {
      const set = (id, val) => {
        const el = document.getElementById(id);
        if (val) { el.textContent = val; el.classList.remove('empty'); }
        else     { el.textContent = '-'; el.classList.add('empty'); }
      };
      set('fieldProduct',  data.product);
      set('fieldTypes',    data.types);
      set('fieldQuantity', data.quantity);
      set('fieldPrice',    data.price);
      set('fieldNote',     data.note);
      set('fieldDate',     data.desired_date ? data.desired_date.replace(/-/g, '.') : '');
      set('fieldDelivery', data.delivery === 'delivery' ? '📦 택배' : '🏪 매장 픽업');
      const addrRow = document.getElementById('fieldAddressRow');
      if (data.delivery === 'delivery') {
        set('fieldAddress', data.address);
        addrRow.style.display = 'flex';
      } else {
        addrRow.style.display = 'none';
      }
    }

    function copyLink() {
      const link = document.getElementById('generatedLink').textContent;
      navigator.clipboard.writeText(link).catch(() => {
        const el = document.createElement('textarea');
        el.value = link; document.body.appendChild(el);
        el.select(); document.execCommand('copy');
        document.body.removeChild(el);
      });
      showToast('링크가 복사됐어요!');
    }

    function previewAsCustomer() {
      document.getElementById('step1').style.display = 'none';
      goToStep(2);
    }

    async function submitOrder() {
      const name  = document.getElementById('customerName').value.trim();
      const phone = document.getElementById('customerPhone').value.trim();
      if (!name)             { showToast('고객명을 입력해주세요.'); return; }
      if (phone.length < 12) { showToast('핸드폰 번호를 정확히 입력해주세요.'); return; }

      if (parsedOrder.delivery === 'delivery') {
        const addr = document.getElementById('customerAddress').value.trim();
        if (!addr) { showToast('배송 주소를 검색해주세요.'); return; }
        const detail = document.getElementById('customerAddressDetail').value.trim();
        parsedOrder.address = detail ? `${addr} ${detail}` : addr;
      }

      const orderData = {
        ...parsedOrder,
        customer_name: name,
        customer_phone: phone,
      };

      try {
        const res = await fetch('/api/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(orderData),
        });
        const json = await res.json();
        if (!res.ok) console.warn('저장 실패:', json.error);
      } catch(e) {
        console.warn('API 호출 실패:', e.message);
      }

      goToStep(4);
    }

    function searchAddress() {
      const overlay = document.getElementById('postcodeOverlay');
      const wrap = document.getElementById('postcodeWrap');
      wrap.innerHTML = '';
      overlay.classList.add('open');
      new daum.Postcode({
        oncomplete: function(data) {
          const addr = data.roadAddress || data.jibunAddress;
          document.getElementById('customerAddress').value = addr;
          overlay.classList.remove('open');
        },
        onclose: function() {
          overlay.classList.remove('open');
        }
      }).embed(wrap);
    }

    function closePostcode() {
      document.getElementById('postcodeOverlay').classList.remove('open');
    }

    function goToStep(n) {
      [1,2,3,4].forEach(i => {
        document.getElementById(`view${i}`).classList.toggle('active', i === n);
        const s = document.getElementById(`step${i}`);
        s.classList.remove('active','done');
        if (i === n) s.classList.add('active');
        else if (i < n) s.classList.add('done');
      });
      if (n === 3) {
        renderSummaryPreview();
        document.getElementById('addressSection').style.display =
          parsedOrder.delivery === 'delivery' ? 'block' : 'none';
      }
      if (n === 4) renderAccountInfo();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderAccountInfo() {
      document.getElementById('displayAmount').textContent  = parsedOrder.price || '-';
      document.getElementById('displayBank').textContent    = BANK_NAME;
      document.getElementById('displayHolder').textContent  = BANK_HOLDER;
      document.getElementById('displayNumber').textContent  = BANK_NUMBER;
    }

    function copyAccount() {
      navigator.clipboard.writeText(BANK_NUMBER).catch(() => {
        const el = document.createElement('textarea');
        el.value = BANK_NUMBER; document.body.appendChild(el);
        el.select(); document.execCommand('copy');
        document.body.removeChild(el);
      });
      const btn = document.getElementById('copyAccountBtn');
      btn.textContent = '✓ 복사 완료!';
      setTimeout(() => { btn.textContent = '계좌번호 복사하기'; }, 2500);
      showToast(`${BANK_NUMBER} 복사됐어요!`);
    }

    function renderSummaryPreview() {
      const fields = [
        { key: '제품명',       val: parsedOrder.product },
        { key: '구움과자 종류', val: parsedOrder.types },
        { key: '박스 갯수',    val: parsedOrder.quantity },
        { key: '가격',         val: parsedOrder.price },
        { key: '날짜',         val: parsedOrder.desired_date ? parsedOrder.desired_date.replace(/-/g, '.') : '' },
        { key: '비고',         val: parsedOrder.note },
        { key: '수령 방법',    val: parsedOrder.delivery === 'delivery' ? '📦 택배' : '🏪 매장 픽업' },
      ];
      document.getElementById('orderSummaryPreview').innerHTML = fields.map(f =>
        `<div class="summary-row">
          <span class="summary-key">${f.key}</span>
          <span class="summary-val">${f.val || '-'}</span>
        </div>`
      ).join('');
    }

    function formatPhone(el) {
      let v = el.value.replace(/\D/g,'').slice(0,11);
      if (v.length <= 3)      el.value = v;
      else if (v.length <= 7) el.value = v.slice(0,3)+'-'+v.slice(3);
      else                    el.value = v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    init();
  </script>
</body>
</html>
