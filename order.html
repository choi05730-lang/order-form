<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주문 확인</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #F97316;
      --primary-light: #FFF7ED;
      --text: #1A1A1A;
      --sub: #999;
      --border: #EBEBEB;
      --input-bg: #F5F5F5;
      --bg: #fff;
    }

    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
    }

    /* ── 헤더 ── */
    .header {
      padding: 28px 24px 0;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      line-height: 1.3;
    }
    .header p {
      font-size: 13px;
      color: var(--sub);
      margin-top: 4px;
    }

    /* ── 스텝 탭 ── */
    .steps {
      display: flex;
      padding: 0 24px;
      margin-top: 24px;
      border-bottom: 1.5px solid var(--border);
    }
    .step {
      flex: 1;
      text-align: center;
      padding-bottom: 12px;
      font-size: 13px;
      font-weight: 600;
      color: var(--sub);
      border-bottom: 2.5px solid transparent;
      margin-bottom: -1.5px;
      cursor: default;
    }
    .step.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    .step.done { color: var(--sub); }

    /* ── 뷰 ── */
    .view { display: none; }
    .view.active { display: block; }

    /* ── 섹션 ── */
    .section {
      padding: 24px 24px 0;
    }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--sub);
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: .3px;
    }

    /* ── 입력 그룹 ── */
    .input-group {
      margin-bottom: 14px;
    }
    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 7px;
    }
    .input-group label .req {
      color: var(--primary);
      margin-left: 2px;
    }
    .input-field {
      width: 100%;
      padding: 14px 16px;
      background: var(--input-bg);
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: background .15s;
    }
    .input-field:focus { background: #EFEFEF; }
    .input-field::placeholder { color: #C0C0C0; }

    /* ── 버튼 ── */
    .btn-primary {
      display: block;
      width: calc(100% - 48px);
      margin: 20px 24px 0;
      padding: 16px;
      background: var(--primary);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-primary:active { opacity: .85; }

    .btn-secondary {
      display: block;
      width: calc(100% - 48px);
      margin: 10px 24px 0;
      padding: 15px;
      background: var(--input-bg);
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-secondary:active { background: #E8E8E8; }

    /* ── 링크 박스 ── */
    .link-box {
      margin: 20px 24px 0;
      padding: 16px;
      background: #F0FDF4;
      border-radius: 12px;
    }
    .link-box-label {
      font-size: 12px;
      font-weight: 700;
      color: #16A34A;
      margin-bottom: 8px;
    }
    .link-text {
      font-size: 12px;
      color: #166534;
      word-break: break-all;
      line-height: 1.6;
    }
    .btn-copy {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 13px;
      background: #16A34A;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    .btn-preview {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 13px;
      background: var(--input-bg);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    /* ── 주문 필드 리스트 (2단계) ── */
    .field-list {
      margin: 0 24px;
    }
    .field-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      gap: 16px;
    }
    .field-row:last-child { border-bottom: none; }
    .field-key {
      font-size: 14px;
      color: var(--sub);
      flex-shrink: 0;
      width: 90px;
    }
    .field-val {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      text-align: right;
      word-break: break-all;
    }
    .field-val.price {
      color: var(--primary);
      font-size: 16px;
    }
    .field-val.empty {
      color: #CCC;
      font-weight: 400;
    }

    /* ── 주문 요약 (3단계) ── */
    .summary-box {
      margin: 0 24px;
      background: var(--primary-light);
      border-radius: 12px;
      padding: 4px 16px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #FFE8D0;
      font-size: 13px;
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-key { color: #C2410C; font-weight: 600; }
    .summary-val { color: var(--text); font-weight: 700; }

    /* ── 토스트 ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(0,0,0,.75);
      color: #fff;
      padding: 11px 22px;
      border-radius: 50px;
      font-size: 14px;
      opacity: 0;
      transition: all .25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    .bottom-pad { height: 48px; }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <div class="header">
    <h1>🎁 답례품 주문</h1>
    <p>주문 내용을 확인하고 정보를 입력해주세요</p>
  </div>

  <!-- 스텝 탭 -->
  <div class="steps">
    <div class="step active" id="step1">주문 입력</div>
    <div class="step" id="step2">주문 확인</div>
    <div class="step" id="step3">정보 입력</div>
  </div>

  <!-- 1단계: 주문 내용 직접 입력 (운영자) -->
  <div class="view active" id="view1">
    <div class="section" style="margin-top:8px;">
      <div class="input-group">
        <label>제품명 <span class="req">*</span></label>
        <input class="input-field" id="inputProduct" type="text" placeholder="예) 구움과자" />
      </div>
      <div class="input-group">
        <label>구움과자 종류 <span class="req">*</span></label>
        <input class="input-field" id="inputTypes" type="text" placeholder="예) 플레인, 무화과, 솔티드, 두바이" />
      </div>
      <div class="input-group">
        <label>박스 갯수</label>
        <input class="input-field" id="inputQuantity" type="text" placeholder="예) 3구 박스 1개" />
      </div>
      <div class="input-group">
        <label>가격 <span class="req">*</span></label>
        <input class="input-field" id="inputPrice" type="text" placeholder="예) 274,000원" />
      </div>
      <div class="input-group">
        <label>비고</label>
        <input class="input-field" id="inputNote" type="text" placeholder="예) 택배비 제외, 스티커 포함 등" />
      </div>
    </div>

    <button class="btn-primary" onclick="goToSummary()">고객 링크 만들기 →</button>

    <!-- 링크 생성 영역 -->
    <div id="linkCard" style="display:none;">
      <div class="link-box" style="margin-top:20px; margin-left:24px; margin-right:24px;">
        <div class="link-box-label">✓ 고객 링크 생성 완료</div>
        <div class="link-text" id="generatedLink"></div>
        <button class="btn-copy" onclick="copyLink()">링크 복사하기</button>
        <button class="btn-preview" onclick="previewAsCustomer()">고객 화면 미리보기</button>
      </div>
    </div>
  </div>

  <!-- 2단계: 주문 내용 확인 -->
  <div class="view" id="view2">
    <div class="section" style="margin-top:8px; padding-bottom:0;">
      <div class="section-title">주문 내용</div>
    </div>
    <div class="field-list">
      <div class="field-row">
        <span class="field-key">제품명</span>
        <span class="field-val" id="fieldProduct"></span>
      </div>
      <div class="field-row">
        <span class="field-key">구움과자 종류</span>
        <span class="field-val" id="fieldTypes"></span>
      </div>
      <div class="field-row">
        <span class="field-key">박스 갯수</span>
        <span class="field-val" id="fieldQuantity"></span>
      </div>
      <div class="field-row">
        <span class="field-key">가격</span>
        <span class="field-val price" id="fieldPrice"></span>
      </div>
      <div class="field-row">
        <span class="field-key">비고</span>
        <span class="field-val" id="fieldNote"></span>
      </div>
    </div>

    <button class="btn-primary" onclick="goToStep(3)">이 내용으로 진행하기 →</button>
    <button class="btn-secondary" onclick="goToStep(1)">← 다시 입력하기</button>
  </div>

  <!-- 3단계: 고객 정보 입력 -->
  <div class="view" id="view3">
    <div class="section" style="margin-top:8px;">
      <div class="input-group">
        <label>고객명 <span class="req">*</span></label>
        <input class="input-field" id="customerName" type="text" placeholder="이름을 입력해주세요" />
      </div>
      <div class="input-group">
        <label>핸드폰 번호 <span class="req">*</span></label>
        <input class="input-field" id="customerPhone" type="tel"
               placeholder="010-0000-0000" oninput="formatPhone(this)" />
      </div>
    </div>

    <div class="section" style="margin-top:20px; padding-bottom:0;">
      <div class="section-title">주문 내용 확인</div>
    </div>
    <div class="summary-box">
      <div id="orderSummaryPreview"></div>
    </div>

    <button class="btn-primary" onclick="submitOrder()">주문 확인 완료 →</button>
    <button class="btn-secondary" onclick="goToStep(2)">← 주문 내용 수정</button>
  </div>

  <div class="bottom-pad"></div>
  <div class="toast" id="toast"></div>

  <script>
    let parsedOrder = { product: '', types: '', quantity: '', price: '', note: '' };

    function init() {
      const params = new URLSearchParams(window.location.search);
      const dataParam = params.get('d');
      if (dataParam) {
        try { parsedOrder = JSON.parse(decodeURIComponent(atob(dataParam))); }
        catch(e) { parsedOrder = { product:'', types:'', quantity:'', price:'', note:'' }; }
        renderOrderFields(parsedOrder);
        document.getElementById('step1').style.display = 'none';
        goToStep(2);
      }
    }

    function goToSummary() {
      const product  = document.getElementById('inputProduct').value.trim();
      const types    = document.getElementById('inputTypes').value.trim();
      const quantity = document.getElementById('inputQuantity').value.trim();
      const price    = document.getElementById('inputPrice').value.trim();
      const note     = document.getElementById('inputNote').value.trim();

      if (!product) { showToast('제품명을 입력해주세요.'); return; }
      if (!price)   { showToast('가격을 입력해주세요.'); return; }

      parsedOrder = { product, types, quantity, price, note };
      renderOrderFields(parsedOrder);

      const encoded = btoa(encodeURIComponent(JSON.stringify(parsedOrder)));
      const url = `${location.origin}${location.pathname}?d=${encoded}`;
      document.getElementById('generatedLink').textContent = url;
      document.getElementById('linkCard').style.display = 'block';
      document.getElementById('linkCard').scrollIntoView({ behavior: 'smooth' });
    }

    function renderOrderFields(data) {
      const set = (id, val) => {
        const el = document.getElementById(id);
        if (val) { el.textContent = val; el.classList.remove('empty'); }
        else     { el.textContent = '-'; el.classList.add('empty'); }
      };
      set('fieldProduct',  data.product);
      set('fieldTypes',    data.types);
      set('fieldQuantity', data.quantity);
      set('fieldPrice',    data.price);
      set('fieldNote',     data.note);
    }

    function copyLink() {
      const link = document.getElementById('generatedLink').textContent;
      navigator.clipboard.writeText(link).catch(() => {
        const el = document.createElement('textarea');
        el.value = link; document.body.appendChild(el);
        el.select(); document.execCommand('copy');
        document.body.removeChild(el);
      });
      showToast('링크가 복사됐어요!');
    }

    function previewAsCustomer() {
      document.getElementById('step1').style.display = 'none';
      goToStep(2);
    }

    function submitOrder() {
      const name  = document.getElementById('customerName').value.trim();
      const phone = document.getElementById('customerPhone').value.trim();
      if (!name)               { showToast('고객명을 입력해주세요.'); return; }
      if (phone.length < 12)   { showToast('핸드폰 번호를 정확히 입력해주세요.'); return; }

      const orderData = { ...parsedOrder, customerName: name, customerPhone: phone };
      console.log('주문 데이터:', orderData);
      showToast('주문 확인이 완료되었어요!');
      // TODO: Supabase 저장 + 4단계 계좌 안내
    }

    function goToStep(n) {
      [1,2,3].forEach(i => {
        document.getElementById(`view${i}`).classList.toggle('active', i === n);
        const s = document.getElementById(`step${i}`);
        s.classList.remove('active','done');
        if (i === n) s.classList.add('active');
        else if (i < n) s.classList.add('done');
      });
      if (n === 3) renderSummaryPreview();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderSummaryPreview() {
      const fields = [
        { key: '제품명',       val: parsedOrder.product },
        { key: '구움과자 종류', val: parsedOrder.types },
        { key: '박스 갯수',    val: parsedOrder.quantity },
        { key: '가격',         val: parsedOrder.price },
        { key: '비고',         val: parsedOrder.note },
      ];
      document.getElementById('orderSummaryPreview').innerHTML = fields.map(f =>
        `<div class="summary-row">
          <span class="summary-key">${f.key}</span>
          <span class="summary-val">${f.val || '-'}</span>
        </div>`
      ).join('');
    }

    function formatPhone(el) {
      let v = el.value.replace(/\D/g,'').slice(0,11);
      if (v.length <= 3)      el.value = v;
      else if (v.length <= 7) el.value = v.slice(0,3)+'-'+v.slice(3);
      else                    el.value = v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    init();
  </script>
</body>
</html>
